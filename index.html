// ── SALESMAN: MY PERFORMANCE ──────────────
PG['s-performance']=async()=>{
  const vanId=S.vanId;
  const mode=W.spm||'weekly';W.spm=mode;
  const now=new Date();
  let fromDate,toDate=TODAY,label='';
  if(mode==='daily'){fromDate=TODAY;toDate=TODAY;label='Today';}
  else if(mode==='weekly'){const d=new Date(now);d.setDate(d.getDate()-6);fromDate=d.toISOString().split('T')[0];label='Last 7 Days';}
  else if(mode==='monthly'){const d=new Date(now);d.setDate(1);fromDate=d.toISOString().split('T')[0];label='This Month';}
  else{fromDate=W.spFrom||TODAY;toDate=W.spTo||TODAY;label='Custom';}

  const [products,orders]=await Promise.all([
    getData('products'),
    sbG('orders',`?van_id=eq.${vanId}&date=gte.${fromDate}&date=lte.${toDate}&order=date.asc`)
  ]);
  let dets=[];
  if(orders.length>0){
    try{dets=await sbG('order_details',`?order_id=in.(${orders.map(o=>o.id).join(',')})`);}catch(e){}
  }

  const rev=orders.reduce((s,o)=>s+(+o.total||0),0);
  const dam=dets.reduce((s,d)=>s+(+d.damage_deduction||0),0);
  const credit=orders.reduce((s,o)=>s+(+o.credit_amount||0),0);
  const cash=rev-credit;
  const soldQ=dets.reduce((s,d)=>s+(+d.qty_sold||0),0);
  const retQ=dets.reduce((s,d)=>s+(+d.packets_returned||0)+(+d.pieces_returned||0),0);
  const retRate=soldQ>0?((retQ/soldQ)*100).toFixed(1):0;
  const damRate=rev>0?((dam/rev)*100).toFixed(1):0;
  const creditRate=rev>0?((credit/rev)*100).toFixed(1):0;

  // Sales by day
  const byDay={};
  orders.forEach(o=>{byDay[o.date]=(byDay[o.date]||0)+(+o.total||0);});
  const dayLabels=Object.keys(byDay).sort();
  const dayVals=dayLabels.map(d=>+(byDay[d]||0).toFixed(2));
  const avgPerDay=dayLabels.length>0?(rev/dayLabels.length).toFixed(0):0;

  // Per product breakdown
  const prodBreakdown=products.map(p=>{
    const pd=dets.filter(d=>d.product_id==p.id);
    const sold=pd.reduce((s,d)=>s+(+d.qty_sold||0),0);
    const r=pd.reduce((s,d)=>s+(+d.line_total||0),0);
    const dm=pd.reduce((s,d)=>s+(+d.damage_deduction||0),0);
    const ret=pd.reduce((s,d)=>s+(+d.packets_returned||0)+(+d.pieces_returned||0),0);
    return{...p,sold,rev:r,dm,ret};
  }).filter(p=>p.sold>0).sort((a,b)=>b.rev-a.rev);

  const maxRev=Math.max(...prodBreakdown.map(p=>p.rev),1);

  return `
  <div class="van-hdr">
    <div class="vh-t">📊 ${S.vanName} — My Performance</div>
    <div class="vh-s">${S.driver} · ${label}</div>
    <div class="vh-stats">
      <div class="vhs"><div class="vhs-v">${orders.length}</div><div class="vhs-l">Orders</div></div>
      <div class="vhs"><div class="vhs-v">${RsC(rev).replace('Rs. ','')}</div><div class="vhs-l">Revenue</div></div>
      <div class="vhs"><div class="vhs-v">${dayLabels.length}</div><div class="vhs-l">Working Days</div></div>
    </div>
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
    ${['daily','weekly','monthly','custom'].map(m=>`<button class="btn btn-sm ${mode===m?'btn-red':''}" onclick="W.spm='${m}';render()">${m==='daily'?'Today':m==='weekly'?'7 Days':m==='monthly'?'Month':'Custom'}</button>`).join('')}
  </div>
  ${mode==='custom'?`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
    <div class="fg" style="flex:1;margin:0"><label class="fl">From</label><input type="date" class="fi" value="${fromDate}" onchange="W.spFrom=this.value;render()"/></div>
    <div class="fg" style="flex:1;margin:0"><label class="fl">To</label><input type="date" class="fi" value="${toDate}" onchange="W.spTo=this.value;render()"/></div>
  </div>`:''}
  <div class="mg mg4">
    <div class="mc"><div class="ml">Cash Collected</div><div class="mv cgrn">${RsC(cash)}</div></div>
    <div class="mc"><div class="ml">Credit Given</div><div class="mv camb">${RsC(credit)}</div><div class="ms">${creditRate}% of sales</div></div>
    <div class="mc"><div class="ml">Damage Deducted</div><div class="mv cred">${RsC(dam)}</div><div class="ms">${damRate}% of revenue</div></div>
    <div class="mc"><div class="ml">Return Rate</div>
      <div class="mv ${parseFloat(retRate)>5?'cred':parseFloat(retRate)>2?'camb':'cgrn'}">${retRate}%</div>
      <div class="ms">${retQ} pkts returned</div>
    </div>
  </div>
  ${dayLabels.length>0?`<div class="card"><div class="chdr"><div class="ct">Daily Revenue</div><div style="font-size:12px;color:var(--txs)">Avg ${RsC(+avgPerDay)}/day</div></div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:80px">
      ${dayLabels.map((d,i)=>{const pct=dayVals[i]/Math.max(...dayVals)*100;return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
        <div style="font-size:9px;color:var(--txs)">${RsC(dayVals[i]).replace('Rs. ','')}</div>
        <div style="width:100%;background:var(--red);border-radius:3px 3px 0 0;opacity:.85;height:${Math.max(4,pct*0.6)}px"></div>
        <div style="font-size:8px;color:var(--txs);white-space:nowrap">${d.slice(5)}</div>
      </div>`;}).join('')}
    </div>
  </div>`:''}
  <div class="card"><div class="ct">Products I Sold</div>
    ${prodBreakdown.length?prodBreakdown.map(p=>`
    <div style="padding:9px 0;border-bottom:1px solid var(--bd)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:13px;font-weight:700">${p.name}</div>
          <div style="font-size:11px;color:var(--txs);margin-top:2px">${p.sold} sold · ${p.ret} returned${p.dm>0?' · Damage: '+RsC(p.dm):''}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:var(--red)">${RsC(p.rev)}</div>
      </div>
      <div style="background:var(--bd);border-radius:100px;height:4px;margin-top:6px;overflow:hidden">
        <div style="height:100%;background:var(--red);border-radius:100px;width:${(p.rev/maxRev*100).toFixed(0)}%"></div>
      </div>
    </div>`).join(''):'<div class="empty" style="padding:12px"><div class="et">No sales in this period</div></div>'}
  </div>
  <div class="card"><div class="ct">💡 Performance Tips</div>
    <div style="font-size:13px;color:var(--txs);line-height:1.7">
      ${parseFloat(creditRate)>30?'⚠ <b>High credit rate ('+creditRate+'%)</b> — Try to collect more cash payments from shops.':'✓ Credit rate is under control.'}
      <br>${parseFloat(retRate)>5?'⚠ <b>High return rate ('+retRate+'%)</b> — Check product freshness and shop storage conditions.':'✓ Return rate is healthy.'}
      <br>${parseFloat(damRate)>10?'⚠ <b>Damage rate is high ('+damRate+'%)</b> — Handle products carefully during delivery.':'✓ Damage rate is acceptable.'}
    </div>
  </div>`;
};

PG['s-customers']=async()=>{
  const vanId=S.vanId;
  const mode=W.scm||'monthly';W.scm=mode;
  const now=new Date();
  let fromDate,toDate=TODAY,label='';
  if(mode==='weekly'){const d=new Date(now);d.setDate(d.getDate()-6);fromDate=d.toISOString().split('T')[0];label='Last 7 Days';}
  else if(mode==='monthly'){const d=new Date(now);d.setDate(1);fromDate=d.toISOString().split('T')[0];label='This Month';}
  else if(mode==='all'){fromDate='2020-01-01';label='All Time';}
  else{fromDate=W.scFrom||TODAY;toDate=W.scTo||TODAY;label='Custom';}

  const [shops,credits,areas,orders]=await Promise.all([
    getData('shops',`?van_id=eq.${vanId}&active=eq.true&order=name`),
    getData('shop_credits'),
    getData('areas',`?van_id=eq.${vanId}`),
    sbG('orders',`?van_id=eq.${vanId}&date=gte.${fromDate}&date=lte.${toDate}`)
  ]);
  let dets=[];
  if(orders.length>0){
    try{dets=await sbG('order_details',`?order_id=in.(${orders.map(o=>o.id).join(',')})`);}catch(e){}
  }

  const shopData=shops.map(s=>{
    const sO=orders.filter(o=>o.shop_id===s.id);
    const sD=dets.filter(d=>sO.map(o=>o.id).includes(d.order_id));
    const rev=sO.reduce((s2,o)=>s2+(+o.total||0),0);
    const cr=sO.reduce((s2,o)=>s2+(+o.credit_amount||0),0);
    const dam=sD.reduce((s2,d)=>s2+(+d.damage_deduction||0),0);
    const soldQ=sD.reduce((s2,d)=>s2+(+d.qty_sold||0),0);
    const retQ=sD.reduce((s2,d)=>s2+(+d.packets_returned||0)+(+d.pieces_returned||0),0);
    const balance=+(credits.find(c=>c.shop_id===s.id)?.balance||0);
    const area=areas.find(a=>a.id===s.area_id);
    const lastOrder=sO.sort((a,b)=>b.date.localeCompare(a.date))[0];
    return{...s,orders:sO.length,rev,cr,dam,soldQ,retQ,balance,areaName:area?.name||'',lastOrder:lastOrder?.date||null};
  });

  const ordered=shopData.filter(s=>s.orders>0).sort((a,b)=>b.rev-a.rev);

        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">

// Sale rows
function sAdd(pid,stk){const s=W.sale;if(!s.rows.find(r=>r.pid==pid))s.rows.push({pid,qty:0,pkts:0,pcs:0});render();}
function sRm(pid){W.sale.rows=W.sale.rows.filter(r=>r.pid!=pid);render();}
function sUpd(pid,f,v){
  const row=W.sale?.rows?.find(r=>r.pid==pid);
  if(!row)return;
  const num=parseInt(v)||0;
  row[f]=num;

  // Get cached data for calculation
  const products=cg('products?active=eq.true&order=sort_order,name')||cg('products')||[];
  const pricePts=cg('piece_prices?order=product_id,pieces')||cg('piece_prices')||[];
  const p=products.find(x=>x.id==pid);
  if(!p)return;

  // Recalculate this product's line total
  const sold=row.qty*p.rate;
  const ded=calcDeduction(p,pricePts,row.pkts||0,row.pcs||0);
  const line=Math.max(0,sold-ded);

  // Update only this product's display elements — NO full render
  const totalEl=document.getElementById('ptap-total-'+pid);
  const calcEl=document.getElementById('ptap-calc-'+pid);
  if(totalEl)totalEl.textContent=Rs(line);
  if(calcEl)calcEl.textContent=sold>0?(Rs(sold)+(ded>0?' − '+Rs(ded):'')+' = '+Rs(line)):'';

  // Recalculate grand total across all rows
  let grand=0;
  W.sale.rows.forEach(r=>{
    const rp=products.find(x=>x.id==r.pid);
    if(!rp)return;
    grand+=Math.max(0,r.qty*rp.rate-calcDeduction(rp,pricePts,r.pkts||0,r.pcs||0));
  });
  const grandEl=document.getElementById('sgrand');
  if(grandEl)grandEl.textContent=Rs(grand);

  // Update order summary lines
  W.sale.rows.forEach(r=>{
    const rp=products.find(x=>x.id==r.pid);if(!rp)return;
    const rded=calcDeduction(rp,pricePts,r.pkts||0,r.pcs||0);
    const rline=Math.max(0,r.qty*rp.rate-rded);
    const sumEl=document.getElementById('sum-line-'+r.pid);
    if(sumEl)sumEl.innerHTML=`<span>${rp.name} ×${r.qty}${rded>0?' (−'+Rs(rded)+' return)':''}</span><span>${Rs(rline)}</span>`;
  });
}

async function aSubmitSale(){
  const st=W.sale,vanId=S.vanId;

  // Show submitting state
  const btn=document.querySelector('.btn-grn.btn-full');
  if(btn){btn.textContent='Saving...';btn.disabled=true;}

  if(!st.shopId){st.msg='Please select a shop.';render();return;}
  const valid=st.rows.filter(r=>r.qty>0);
  if(!valid.length){st.msg='Add at least one product with quantity greater than 0.';render();return;}

  // Use the sale date for stock check (not hardcoded TODAY)
  const saleDate=st.date||TODAY;
  const products=cg('products?active=eq.true&order=sort_order,name')||cg('products')||[];
  const pricePts=cg('piece_prices?order=product_id,pieces')||cg('piece_prices')||[];

  // Fetch fresh stock data for the sale date
  let loads=[],orders=[],allDets=[],carries=[];
  try{
    [loads,orders,allDets,carries]=await Promise.all([
      sbG('van_loads',`?date=eq.${saleDate}&van_id=eq.${vanId}`),
      sbG('orders',`?date=eq.${saleDate}&van_id=eq.${vanId}`),
      sbG('order_details'),
      sbG('carryover',`?to_date=eq.${saleDate}&van_id=eq.${vanId}`)
    ]);
  }catch(e){
    // Offline — use cache
    loads=cg(`van_loads?date=eq.${saleDate}&van_id=eq.${vanId}`)||
          cg(`van_loads?date=eq.${TODAY}&van_id=eq.${vanId}`)||[];
    orders=cg(`orders?date=eq.${saleDate}&van_id=eq.${vanId}`)||[];
    allDets=cg('order_details')||[];
    carries=cg(`carryover?to_date=eq.${saleDate}&van_id=eq.${vanId}`)||[];
  }

  const oids=orders.map(o=>o.id);
  const dets=allDets.filter(d=>oids.includes(d.order_id));

  // Stock check — warn but don't block if no loads found (might be a data issue)
  for(const r of valid){
    const l=loads.filter(x=>x.product_id==r.pid).reduce((s,x)=>s+(+x.qty||0),0);
    const c=carries.filter(x=>x.product_id==r.pid).reduce((s,x)=>s+(+x.qty||0),0);
    const sold=dets.filter(x=>x.product_id==r.pid).reduce((s,x)=>s+(+x.qty_sold||0),0);
    const stk=l+c-sold;
    if(l+c>0&&r.qty>stk){
      const p=products.find(x=>x.id==r.pid);
      st.msg=`Not enough stock: ${p?p.name:'product'} (only ${stk} left in van)`;
      render();return;
    }
  }

  // Build order details
  let total=0;
  const details=valid.map(r=>{
    const p=products.find(x=>x.id==r.pid);
    const rate=p?+p.rate:0;
    const ded=calcDeduction(p||{rate:0,has_piece_pricing:false,pieces_per_packet:1},pricePts,r.pkts||0,r.pcs||0);
    const line=Math.max(0,r.qty*rate-ded);
    total+=line;
    return{
      product_id:parseInt(r.pid),
      qty_sold:parseInt(r.qty),
      packets_returned:parseInt(r.pkts)||0,
      pieces_returned:parseInt(r.pcs)||0,
      damage_deduction:parseFloat(ded.toFixed(2)),
      rate:parseFloat(rate.toFixed(2)),
      line_total:parseFloat(line.toFixed(2))
    };
  });

  const creditAmt=st.pm==='cash'?0:st.pm==='credit'?total:Math.max(0,total-(st.paidNow||0));
  const paidAmt=st.pm==='cash'?total:st.pm==='credit'?0:(st.paidNow||0);

  const orderPayload={
    date:saleDate,
    van_id:parseInt(vanId),
    shop_id:parseInt(st.shopId),
    total:parseFloat(total.toFixed(2)),
    payment_method:st.pm||'cash',
    paid_amount:parseFloat(paidAmt.toFixed(2)),
    credit_amount:parseFloat(creditAmt.toFixed(2))
  };

  let savedOid=null;
  try{
    const res=await sbP('orders',[orderPayload]);
    savedOid=res[0]?.id;
    if(!savedOid)throw new Error('Order saved but no ID returned');
    await sbP('order_details',details.map(d=>({...d,order_id:savedOid})));
  }catch(e){
    console.error('Save failed:',e.message);
    // Queue for offline sync
    qAdd({type:'ins',table:'orders',data:orderPayload});
    details.forEach(d=>qAdd({type:'ins',table:'order_details',data:{...d,order_id:-Date.now()}}));
    updSync();
  }

  // Update shop credit balance
  if(creditAmt>0){
    try{
      const ex=await sbG('shop_credits',`?shop_id=eq.${st.shopId}`);
      const bal=ex.length?(+ex[0].balance||0):0;
      const nb=parseFloat((bal+creditAmt).toFixed(2));
      if(ex.length)await sbU('shop_credits',`?shop_id=eq.${st.shopId}`,{balance:nb,updated_at:new Date().toISOString()});
      else await sbP('shop_credits',[{shop_id:parseInt(st.shopId),balance:nb}]);
    }catch(e){
      qAdd({type:'ins',table:'shop_credits',data:{shop_id:parseInt(st.shopId),balance:parseFloat(creditAmt.toFixed(2))}});
      updSync();
    }
  }

  // Refresh cache after save
  try{
    const fresh=await sbG('orders',`?date=eq.${saleDate}&van_id=eq.${vanId}`);
    cs(`orders?date=eq.${saleDate}&van_id=eq.${vanId}`,fresh);
    const freshDets=await sbG('order_details');
    cs('order_details',freshDets);
  }catch(e){}

  // Build receipt and reset sale state
  const allShops=cg(`shops?van_id=eq.${vanId}&active=eq.true&order=name`)||cg('shops')||[];
  const receiptShop=allShops.find(s=>s.id==parseInt(st.shopId));
  W.sale={
    shopId:'',shopSearch:'',addingShop:false,
    ns:{name:'',address:'',phone:'',contact:''},
    date:saleDate,rows:[],pm:'cash',paidNow:0,msg:'',
    lastReceipt:{
      shopName:receiptShop?.name||'Shop #'+st.shopId,
      total,creditAmt,pm:st.pm,
      details:details.map(d=>({
        name:(products.find(x=>x.id==d.product_id)||{name:'?'}).name,
        qty:d.qty_sold,
        ded:d.damage_deduction,
        line:d.line_total
      }))
    }
  };
  render();
}

async function aCloseDay(expectedCash,damageEntries,unsoldEntries){
  const st=W.cl;
  if(!st.cash){st.msg='Enter your cash amount.';render();return;}
  const declared=parseFloat(st.cash);
  const vanId=S.vanId;
  const tmrwDate=tmrw();
  const todO=await sbG('orders',`?date=eq.${TODAY}&van_id=eq.${vanId}`);
  const tmrwO=await sbG('orders',`?date=eq.${tmrwDate}&van_id=eq.${vanId}`);
  const useDate=tmrwO.length>0?tmrwDate:TODAY;
  const orders=useDate===tmrwDate?tmrwO:todO;
  let dets=[];
  if(orders.length>0){
    try{dets=await sbG('order_details',`?order_id=in.(${orders.map(o=>o.id).join(',')})`);}catch(e){}
  }
  const totalSold=orders.reduce((s,o)=>s+(+o.total||0),0);
  const totalDamAmt=dets.reduce((s,d)=>s+(+d.damage_deduction||0),0);
  const totalCredit=orders.reduce((s,o)=>s+(+o.credit_amount||0),0);
  const totalDamQty=Object.values(damageEntries||{}).reduce((s,v)=>s+(+v||0),0);
  const totalUnsoldQty=Object.values(unsoldEntries||{}).reduce((s,v)=>s+(+v||0),0);

  // Save van_returns per product
  const de=damageEntries||{};const ue=unsoldEntries||{};
  const allPids=new Set([...Object.keys(de),...Object.keys(ue)]);
  for(const pid of allPids){
    const dq=parseInt(de[pid])||0;const uq=parseInt(ue[pid])||0;
    if(!dq&&!uq)continue;
    try{
      const ex=await sbG('van_returns',`?date=eq.${useDate}&van_id=eq.${vanId}&product_id=eq.${pid}`);
      const payload={date:useDate,van_id:parseInt(vanId),product_id:parseInt(pid),damage_qty:dq,unsold_qty:uq};
      if(ex.length)await sbU('van_returns',`?id=eq.${ex[0].id}`,{damage_qty:dq,unsold_qty:uq});
      else await sbP('van_returns',[payload]);
    }catch(e){qAdd({type:'ins',table:'van_returns',data:{date:useDate,van_id:parseInt(vanId),product_id:parseInt(pid),damage_qty:dq,unsold_qty:uq}});updSync();}
  }

  const settleData={
    date:useDate,van_id:parseInt(vanId),
    total_sold:parseFloat(totalSold.toFixed(2)),
    total_damage:parseFloat(totalDamAmt.toFixed(2)),
    total_damage_qty:totalDamQty,
    total_unsold_qty:totalUnsoldQty,
    total_credit_given:parseFloat(totalCredit.toFixed(2)),
    expected_cash:parseFloat(expectedCash),
    salesman_declared_cash:declared,
    status:'salesman_submitted',
    salesman_submitted_at:new Date().toISOString(),
    return_submitted_at:new Date().toISOString()
  };
  try{
    const ex=await sbG('settlements',`?date=eq.${useDate}&van_id=eq.${vanId}`);
    if(ex.length)await sbU('settlements',`?id=eq.${ex[0].id}`,settleData);
    else await sbP('settlements',[settleData]);
  }catch(e){qAdd({type:'ins',table:'settlements',data:settleData});updSync();}
  W.cl={cash:'',unsoldEntries:{},damageEntries:{},step:1,msg:''};render();
}

}

async function aCarry(meta){const st=W.co;const prev=new Date(st.date);prev.setDate(prev.getDate()-1);const ps=prev.toISOString().split('T')[0];for(const m of meta){const qty=parseInt(document.getElementById('co-'+m.idx)?.value||0);if(!qty)continue;if(m.exId)await sbU('carryover',`?id=eq.${m.exId}`,{qty});else await sbP('carryover',[{from_date:ps,to_date:st.date,van_id:parseInt(st.vanId),product_id:m.pid,qty}]);}W.co.msg='✓ Carryover saved.';render();}
async function aPayment(){const st=W.cr;if(!st.sid||!st.amt){st.msg='Select shop and enter amount.';render();return;}await write('payments',{date:TODAY,shop_id:parseInt(st.sid),amount:parseFloat(st.amt),note:st.note||null,recorded_by:'owner'});try{const ex=await sbG('shop_credits',`?shop_id=eq.${st.sid}`);const bal=ex.length?(+ex[0].balance||0):0;const nb=parseFloat((bal-parseFloat(st.amt)).toFixed(2));if(ex.length)await sbU('shop_credits',`?shop_id=eq.${st.sid}`,{balance:nb,updated_at:new Date().toISOString()});else await sbP('shop_credits',[{shop_id:parseInt(st.sid),balance:nb}]);}catch(e){}W.cr={sid:'',amt:'',note:'',msg:'✓ Payment recorded.'};render();}
async function delIt(table,query){if(!confirm('Delete this?'))return;await sbD(table,query);render();}

// ── Export ────────────────────────────────
async function exportCSV(date){
  const [products,vans,shops,orders,rawDets]=await Promise.all([getData('products'),getData('vans'),getData('shops'),getData('orders',`?date=eq.${date}`),getData('order_details')]);
  const oids=orders.map(o=>o.id);const dets=rawDets.filter(d=>oids.includes(d.order_id));
  let csv='BS Date,AD Date,Van,Driver,Shop,Product,Qty Sold,Pkts Returned,Pcs Returned,Damage(Rs.),Rate,Line Total,Payment\n';
  orders.forEach(o=>{const v=vans.find(x=>x.id==o.van_id),sh=shops.find(x=>x.id==o.shop_id);dets.filter(d=>d.order_id==o.id).forEach(d=>{const p=products.find(x=>x.id==d.product_id);csv+=`"${bsS(date)}","${date}","${v?.name||''}","${v?.driver||''}","${sh?.name||''}","${p?.name||''}",${d.qty_sold},${d.packets_returned||0},${d.pieces_returned||0},${(+d.damage_deduction||0).toFixed(2)},${(+d.rate).toFixed(2)},${(+d.line_total).toFixed(2)},"${o.payment_method}"\n`;});});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`bakerytrack_${date}.csv`;a.click();
}
async function printRpt(date){
  const [products,vans,shops,orders,rawDets,settlements]=await Promise.all([getData('products'),getData('vans'),getData('shops'),getData('orders',`?date=eq.${date}`),getData('order_details'),getData('settlements',`?date=eq.${date}`)]);
  const oids=orders.map(o=>o.id);const dets=rawDets.filter(d=>oids.includes(d.order_id));
  const rev=orders.reduce((s,o)=>s+(+o.total||0),0);const dam=dets.reduce((s,d)=>s+(+d.damage_deduction||0),0);
  let html=`<!DOCTYPE html><html><head><title>BakeryTrack ${bsL(date)}</title>
  <style>body{font-family:Arial,sans-serif;font-size:12px;padding:24px;color:#111}h1{font-size:16px;font-weight:800}h2{font-size:13px;margin:14px 0 5px;font-weight:700}.meta{color:#666;font-size:11px;margin:3px 0 10px}.sum{display:flex;gap:20px;padding:10px 14px;background:#f5f4f0;border-radius:5px;margin-bottom:12px}.si .sl{font-size:10px;color:#888;text-transform:uppercase;font-weight:700}.si .sv{font-size:16px;font-weight:800;margin-top:1px}table{width:100%;border-collapse:collapse;font-size:11px}th,td{border:1px solid #ddd;padding:4px 7px;text-align:left}th{background:#f5f5f5;font-weight:700;font-size:10px;text-transform:uppercase}.tr{text-align:right}.bold{font-weight:700;background:#f9f9f9}</style></head><body>
  <h1>🥐 BakeryTrack Nepal — Daily Report</h1><div class="meta">BS: ${bsL(date)} · AD: ${date} · Printed: ${new Date().toLocaleString()}</div>
  <div class="sum"><div class="si"><div class="sl">Revenue</div><div class="sv">Rs.${rev.toFixed(2)}</div></div><div class="si"><div class="sl">Damage</div><div class="sv">Rs.${dam.toFixed(2)}</div></div><div class="si"><div class="sl">Orders</div><div class="sv">${orders.length}</div></div></div>
  <h2>Sales by Van</h2><table><tr><th>Van</th><th>Driver</th><th>Orders</th><th class="tr">Revenue</th><th class="tr">Damage</th><th>Settlement</th></tr>
  ${vans.map(v=>{const vO=orders.filter(o=>o.van_id===v.id);const vD=dets.filter(d=>vO.map(o=>o.id).includes(d.order_id));const r=vO.reduce((s,o)=>s+(+o.total||0),0);const dm=vD.reduce((s,d)=>s+(+d.damage_deduction||0),0);const s=settlements.find(x=>x.van_id===v.id);return`<tr><td>${v.name}</td><td>${v.driver}</td><td>${vO.length}</td><td class="tr">Rs.${r.toFixed(2)}</td><td class="tr">Rs.${dm.toFixed(2)}</td><td>${s?.status||'pending'}</td></tr>`;}).join('')}</table>
  <h2>Order Details</h2><table><tr><th>Van</th><th>Shop</th><th>Product</th><th class="tr">Sold</th><th class="tr">Ret.Pkt</th><th class="tr">Ret.Pcs</th><th class="tr">Deduction</th><th class="tr">Total</th><th>Pay</th></tr>
  ${orders.map(o=>{const v=vans.find(x=>x.id==o.van_id),sh=shops.find(x=>x.id==o.shop_id);const rows=dets.filter(d=>d.order_id==o.id).map(d=>{const p=products.find(x=>x.id==d.product_id);return`<tr><td>${v?.name||''}</td><td>${sh?.name||''}</td><td>${p?.name||''}</td><td class="tr">${d.qty_sold}</td><td class="tr">${d.packets_returned||0}</td><td class="tr">${d.pieces_returned||0}</td><td class="tr">Rs.${(+d.damage_deduction||0).toFixed(2)}</td><td class="tr">Rs.${(+d.line_total).toFixed(2)}</td><td>${o.payment_method}</td></tr>`;}).join('');return rows+`<tr class="bold"><td colspan="8">Order #${o.id} — ${sh?.name||''}</td><td class="tr">Rs.${(+o.total).toFixed(2)}</td></tr>`;}).join('')}</table>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();w.print();
}
